<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoveX - Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="login-page">

    <!-- LEFT SIDE -->
    <div class="login-left">
        <div class="overlay"></div>
        <div class="brand-content">
            <h1>MoveX</h1>
            <p>Reset your password securely</p>
            <div class="features">
                <div class="feature">
                    <i class="fa-solid fa-lock"></i>
                    <span>Secure Reset</span>
                </div>
                <div class="feature">
                    <i class="fa-solid fa-envelope"></i>
                    <span>Email OTP</span>
                </div>
                <div class="feature">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>Safe & Secure</span>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="login-right">
        <div class="login-box">

            <!-- STEP 1 — EMAIL -->
            <div id="step-email">
                <h2>Forgot Password 🔐</h2>
                <p class="sub-text">Enter your email to receive OTP</p>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="fp-email" placeholder="Enter your email">
                </div>

                <button class="login-btn" onclick="sendOTP()">
                    Send OTP
                </button>

                <p class="signup-text">
                    Remember password?
                    <a href="login.html">Login</a>
                </p>
            </div>

            <!-- STEP 2 — OTP -->
            <div id="step-otp" style="display:none;">
                <h2>Enter OTP 📩</h2>
                <p class="sub-text">OTP sent to your email. Valid for 10 minutes.</p>

                <div class="input-group">
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="fp-otp" placeholder="Enter 6-digit OTP" maxlength="6">
                </div>

                <button class="login-btn" onclick="verifyOTP()">
                    Verify OTP
                </button>

                <p class="signup-text">
                    Didn't receive?
                    <a href="#" onclick="resendOTP()">Resend OTP</a>
                </p>
            </div>

            <!-- STEP 3 — NEW PASSWORD -->
            <div id="step-password" style="display:none;">
                <h2>New Password 🔑</h2>
                <p class="sub-text">Create a strong new password</p>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="fp-newpass" placeholder="Enter new password">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="fp-confirmpass" placeholder="Confirm new password">
                </div>

                <button class="login-btn" onclick="resetPassword()">
                    Reset Password
                </button>
            </div>

        </div>
    </div>

</div>

<script>
const API = "https://api.movex.services/api";
let userEmail = "";
let userOTP = "";

function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// STEP 1 — Send OTP
async function sendOTP() {
    const email = document.getElementById("fp-email").value.trim();

    if(!email) { alert("❌ Please enter your email."); return; }
    if(!isValidEmail(email)) { alert("❌ Invalid email format."); return; }

    try {
        const res = await fetch(`${API}/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        // DEBUG
        const text = await res.text();
        console.log("Status:", res.status);
        console.log("Response:", text);

        let result;
        try {
            result = JSON.parse(text);
        } catch(e) {
            alert("❌ Invalid response: " + text);
            return;
        }

        if(result.message === "OTP Sent") {
            userEmail = email;
            alert("✅ OTP sent to your email!");
            document.getElementById("step-email").style.display = "none";
            document.getElementById("step-otp").style.display = "block";
        } else if(result.error) {
            alert("❌ Error: " + result.error);
        } else {
            alert("❌ " + JSON.stringify(result));
        }

    } catch(err) {
        console.log("Fetch error:", err);
        alert("❌ Fetch Error: " + err.message);
    }
}

// Resend OTP
async function resendOTP() {
    try {
        const res = await fetch(`${API}/forgot-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: userEmail })
        });
        const text = await res.text();
        console.log("Resend response:", text);
        const result = JSON.parse(text);
        if(result.message === "OTP Sent") {
            alert("✅ OTP resent!");
        } else {
            alert("❌ " + JSON.stringify(result));
        }
    } catch(err) {
        alert("❌ Server Error: " + err.message);
    }
}

// STEP 2 — Verify OTP
async function verifyOTP() {
    const otp = document.getElementById("fp-otp").value.trim();

    if(!otp || otp.length !== 6) {
        alert("❌ Please enter valid 6-digit OTP.");
        return;
    }

    try {
        const res = await fetch(`${API}/verify-otp`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: userEmail, otp })
        });

        const text = await res.text();
        console.log("Verify OTP response:", text);
        const result = JSON.parse(text);

        if(result.message === "OTP Verified") {
            userOTP = otp;
            alert("✅ OTP Verified!");
            document.getElementById("step-otp").style.display = "none";
            document.getElementById("step-password").style.display = "block";
        } else {
            alert("❌ " + result.message);
        }
    } catch(err) {
        alert("❌ Server Error: " + err.message);
    }
}

// STEP 3 — Reset Password
async function resetPassword() {
    const newpass = document.getElementById("fp-newpass").value.trim();
    const confirmpass = document.getElementById("fp-confirmpass").value.trim();

    if(!newpass) { alert("❌ Please enter new password."); return; }
    if(newpass.length < 6) { alert("❌ Password must be at least 6 characters."); return; }
    if(newpass !== confirmpass) { alert("❌ Passwords do not match!"); return; }

    try {
        const res = await fetch(`${API}/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: userEmail,
                otp: userOTP,
                newPassword: newpass
            })
        });

        const text = await res.text();
        console.log("Reset response:", text);
        const result = JSON.parse(text);

        if(result.message === "Password Reset Successful") {
            alert("✅ Password reset successful! Please login.");
            window.location.href = "login.html";
        } else {
            alert("❌ " + result.message);
        }
    } catch(err) {
        alert("❌ Server Error: " + err.message);
    }
}
</script>

</body>
</html>
